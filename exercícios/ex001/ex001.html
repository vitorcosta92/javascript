<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso JavaScript - Módulo A - Aula 4 </title>
    <style>
        body {
            background-color: lightyellow;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-weight: bold;
            font-size: 2em;
        }

        h1 {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Já me livrei da maldição.</p>
    <script>
        window.alert('Minha primeira mensagem: O PALMEIRAS NÃO TEM MUNDIAL!') //Janela de Alerta
        window.confirm('VAI CORINTHIANS!') //Janela com botão OK e Cancel
        window.prompt('Qual é o seu nome? Seja bem-vindo(a)!') //vai perguntar o nome
        //serve para fazer comentário de uma linha
        /*Tudo o que está entre esses símbolos faz parte de um comentário*/
        
    </script>
</body>
</html>
